services:
  file-server:
    container_name: secure-file-server
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: ${SERVER_PORT:-9000}
      TLS_ENABLED: ${TLS_ENABLED:-false}
      USERS_FILE: ${USERS_FILE:-users.json}
      STORAGE_DIR: ${STORAGE_DIR:-storage}
      LOG_FILE: ${LOG_FILE:-server.log}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-1800}
      LOCKOUT_THRESHOLD: ${LOCKOUT_THRESHOLD:-5}
      LOCKOUT_WINDOW_SECONDS: ${LOCKOUT_WINDOW_SECONDS:-300}
      LOCKOUT_DURATION_SECONDS: ${LOCKOUT_DURATION_SECONDS:-60}
      PASSWORD_ITERATIONS: ${PASSWORD_ITERATIONS:-200000}
      SOCKET_TIMEOUT_SECONDS: ${SOCKET_TIMEOUT_SECONDS:-30}
      SERVER_CERT_PATH: ${SERVER_CERT_PATH:-certs/server.crt}
      SERVER_KEY_PATH: ${SERVER_KEY_PATH:-certs/server.key}
      CA_CERT_PATH: ${CA_CERT_PATH:-certs/server.crt}
    ports:
      - "${SERVER_PORT:-9000}:9000"
    volumes:
      - ./storage:/app/storage
      - ./users.json:/app/users.json
      - ./certs:/app/certs
    command: ["python", "server.py"]
